name: booking-bff-ci

on:
  push:
    branches: [main, integration]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true
      - run: test -z "$(gofmt -l .)"
      - run: go test ./...
      - run: docker build -t pawit-booking-bff:${{ github.sha }} .
